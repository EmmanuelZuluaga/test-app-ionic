<ion-content class="ion-padding">
  <ion-button id="open-modal" expand="block">Open</ion-button>
  <ion-modal [isOpen]="isOpen" trigger="open-modal" (willDismiss)="onWillDismiss($event)">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancel()">Cancelar</ion-button>
          </ion-buttons>
          <ion-title>Editar categoria</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="confirm()" [strong]="true">Editar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input label="Editar nombre" labelPlacement="stacked" type="text" placeholder="Nombre"
            [(ngModel)]="updateCategory.name"></ion-input>

        </ion-item>

        <ion-item>

          <ion-select (ngModel)="updsateCategory" (value)="updsateCategory" (ionChange)="handleChange($event)"
            placeholder="Tareas asociadas a esta categoria" [multiple]="true" label-placement="stacked">

            @for (task of tasks; track $index) {
            <ion-select-option [value]="task">{{task.name}}</ion-select-option>

            }

          </ion-select>
        </ion-item>

      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
