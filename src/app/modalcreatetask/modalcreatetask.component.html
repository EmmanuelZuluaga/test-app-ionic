
<ion-content class="ion-padding">
  <ion-button id="open-modal" expand="block">Open</ion-button>
  <p>{{ message }}</p>
  <ion-modal trigger="open-modal" (willDismiss)="onWillDismiss($event)">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancel()">Cancelar</ion-button>
          </ion-buttons>
          <ion-title>Crear tarea</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="confirm()" [strong]="true">Crear</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input label="Escriba el nombre de la tarea" labelPlacement="stacked" type="text" placeholder="Nombre"
            [(ngModel)]="name"></ion-input>

        </ion-item>
        <ion-item>
          <ion-input label="Escriba una descripción de la tarea" labelPlacement="stacked" type="text"
            placeholder="Descripción" [(ngModel)]="description"></ion-input>

        </ion-item>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
